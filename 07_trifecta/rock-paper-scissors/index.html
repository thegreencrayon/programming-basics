<!DOCTYPE html>
<html>
    <head>
        <title>Rock Paper Scissors Game</title>
        <style rel="stylesheet" href="style.css"></style>
    </head>
    <body>
        <p>Click one of the following moves and go against your computer opponent!</p>
        <div class="gallery">
            <div class="image-container">
                <img class="moves" data-move="rock" alt="Marble rock" src="https://public.blenderkit.com/thumbnails/assets/61de11a51dac4ca5bf5ac7376cf9817d/files/thumbnail_7e89df8f-0c58-4aca-a3cc-f822a1b643d2.jpg.256x256_q85.jpg.webp?webp_generated=1766488698">
                <label class="image-label">Rock</label>
            </div>
            <div class="image-container">
                <img class="moves" data-move="paper" alt="Plain white paper" src="https://cld-assets.dick-blick.com/image/upload/c_limit,w_256/f_auto/q_auto/v1/13408-1005-1-4ww?_a=BAVAZGB00">
                <label class="image-label">Paper</label>
            </div>
            <div class="image-container">
                <img class="moves" data-move="scissors" alt="Yellow scissors" src="https://cld-assets.dick-blick.com/image/upload/c_limit,w_256/f_auto/q_auto/v1/57040-1005-1-4ww?_a=BAVAZGB00">
                <label class="image-label">Scissors</label>
            </div>
        </div>
        <!--Displays result of the match-->
        <p id="text-result"></p>
        <div id="visual-result" class="image-container">
            <img src=""> 
            <label class="image-label"></label>
        </div>
        <script src="script.js"></script>
    </body>
</html>
